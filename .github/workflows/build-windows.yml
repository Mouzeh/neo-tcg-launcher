name: 🪟 Build Windows Launcher

on:
  workflow_dispatch:  # Permite ejecutarlo manualmente desde la web

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🔨 Compile with PyInstaller
        run: |
          # Si tienes icon.ico en la raíz del repo, usa --icon "icon.ico"
          # Si NO lo tienes, quita esa parte del comando
          pyinstaller --onefile --windowed --name NeoTcgLauncher --icon "icon.ico" launcher_gui.py

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NeoTcgLauncher-Windows
          path: dist/NeoTcgLauncher.exe
